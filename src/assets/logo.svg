<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Top Arch -->
  <path d="M 15 50 A 35 35 0 0 1 85 50" />
  
  <!-- Top Vertical Lines (Broken at Y=60 for text) -->
  <line x1="15" y1="50" x2="15" y2="60" />
  <line x1="32.5" y1="19.7" x2="32.5" y2="60" />
  <line x1="50" y1="15" x2="50" y2="60" />
  <line x1="67.5" y1="19.7" x2="67.5" y2="60" />
  <line x1="85" y1="50" x2="85" y2="60" />
  
  <!-- Tiny handles in the middle-ish of top half -->
  <line x1="44" y1="46" x2="44" y2="54" stroke-width="2" />
  <line x1="56" y1="46" x2="56" y2="54" stroke-width="2" />
  
  <!-- Text in the middle gap (Y=60 to Y=72) -->
  <text x="50" y="68" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="bold" letter-spacing="0.5" text-anchor="middle" fill="currentColor" stroke="none">SS DOOR'S</text>
  
  <!-- Bottom Vertical Lines (Starts at Y=72) -->
  <line x1="15" y1="72" x2="15" y2="105" />
  <line x1="32.5" y1="72" x2="32.5" y2="105" />
  <line x1="50" y1="72" x2="50" y2="105" />
  <line x1="67.5" y1="72" x2="67.5" y2="105" />
  <line x1="85" y1="72" x2="85" y2="105" />
  
  <!-- Bottom Horizontal base line -->
  <line x1="15" y1="105" x2="85" y2="105" />
</svg>
